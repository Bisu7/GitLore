version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codebase-time-machine-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: codebase_time_machine
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: codebase-time-machine-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
